<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корпоративный портал СВОИ</title>
    <!-- Подключаем Tailwind CSS для стилей -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Подключаем React и Babel для работы кода прямо в браузере -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Подключаем иконки Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; margin: 0; overflow-x: hidden; }
        
        @keyframes driveFull {
            0% { transform: translateX(-150%); }
            100% { transform: translateX(1200%); }
        }
        .animate-drive-slow { animation: driveFull 25s linear infinite; }
        
        .bg-dashed-line {
            background-image: linear-gradient(to right, #000 50%, transparent 50%);
            background-size: 40px 2px;
            height: 2px;
            width: 100%;
            opacity: 0.1;
            position: absolute;
            top: 50%;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .animate-shake { animation: shake 0.15s ease-in-out 0s 2; }

        .slide-content::-webkit-scrollbar { width: 6px; }
        .slide-content::-webkit-scrollbar-track { background: #f1f1f1; }
        .slide-content::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // Вспомогательный компонент иконки (так как в CDN версии Lucide работает иначе)
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const DEPARTMENTS = [
            { id: 'tp_chats', title: 'ТП Чаты', icon: 'message-square', pin: '1111', description: 'Поддержка водителей в чатах' },
            { id: 'tp_calls', title: 'ТП Звонки', icon: 'phone', pin: '2222', description: 'Голосовая поддержка' },
            { id: 'op_chats', title: 'ОП Чаты', icon: 'users', pin: '3333', description: 'Продажи в мессенджерах' },
            { id: 'op_requests', title: 'ОП Заявки', icon: 'file-text', pin: '4444', description: 'Обработка входящих лидов' }
        ];

        function App() {
            const [view, setView] = useState('main');
            const [selectedDept, setSelectedDept] = useState(null);
            const [pinInput, setPinInput] = useState('');
            const [error, setError] = useState(false);
            const [currentSlide, setCurrentSlide] = useState(1);
            const cheatSheetRef = useRef(null);
            const totalSlides = 9;

            const handlePinSubmit = (e) => {
                e.preventDefault();
                if (pinInput === selectedDept.pin) {
                    setView('content');
                    setCurrentSlide(1);
                } else {
                    setError(true);
                    setPinInput('');
                }
            };

            const Presentation = () => (
                <div className="w-full max-w-6xl mx-auto mb-16 px-4">
                    <div className="relative overflow-hidden bg-white rounded-[40px] shadow-2xl border border-gray-100 min-h-[650px] flex flex-col">
                        <div className="absolute top-0 left-0 w-full h-2 bg-gray-100 z-50">
                            <div className="h-full bg-yellow-400 transition-all duration-300" style={{ width: `${(currentSlide / totalSlides) * 100}%` }}></div>
                        </div>

                        <div className="flex-1 p-10 slide-content overflow-y-auto">
                            {currentSlide === 1 && (
                                <div className="flex flex-col items-center justify-center h-full text-center py-20">
                                    <div className="absolute top-0 right-0 w-1/2 h-full bg-yellow-400 skew-x-[-15deg] translate-x-32 z-0 opacity-20"></div>
                                    <img src="https://taxi-svoi.ru/wp-content/themes/taxi/img/logo.png" alt="СВОИ" className="h-24 mb-8 relative z-10" />
                                    <h1 className="text-6xl font-black italic uppercase tracking-tighter text-black relative z-10">ГИД <span className="bg-black text-yellow-400 px-4">СВОИ</span><br/>ПОДДЕРЖКИ</h1>
                                    <p className="mt-6 text-gray-500 font-bold italic uppercase tracking-widest relative z-10">Оперативность • Качество • Спокойствие</p>
                                </div>
                            )}

                            {currentSlide === 2 && (
                                <div>
                                    <h2 className="text-3xl font-black uppercase mb-8 border-l-[10px] border-yellow-400 pl-6 italic">📈 Показатели успеха</h2>
                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-10">
                                        <table className="w-full text-sm rounded-2xl overflow-hidden shadow-xl border border-gray-100">
                                            <tbody>
                                                <tr className="bg-green-500 text-white font-black font-black uppercase italic"><td className="p-4">100%+ — Мастер</td></tr>
                                                <tr className="bg-green-50 font-bold border-b border-gray-100"><td className="p-4">97% – 100% — Отлично</td></tr>
                                                <tr className="bg-yellow-50 font-bold border-b border-gray-100"><td className="p-4">95% – 97% — Хорошо</td></tr>
                                                <tr className="bg-orange-50 font-bold border-b border-gray-100"><td className="p-4">93% – 94% — Внимание</td></tr>
                                                <tr className="bg-red-600 text-white font-black"><td className="p-4 uppercase italic">Ниже 89% — Критично</td></tr>
                                            </tbody>
                                        </table>
                                        <div className="space-y-4">
                                            <div className="bg-gray-50 p-6 rounded-3xl border-2 border-black font-bold italic">
                                                <p>• 100+ чатов за смену</p>
                                                <p>• 5 минут — идеальный ответ</p>
                                                <p>• Тесты — обязательно</p>
                                            </div>
                                            <div className="bg-black text-white p-6 rounded-3xl space-y-3">
                                                <p className="text-yellow-400 font-black uppercase text-[10px] tracking-widest">Таблицы:</p>
                                                <a href="https://docs.google.com/spreadsheets/d/1huOBRKU2MLql9hys-kBqznj7srys_2UwM0CFTdeW0vg/edit#gid=0" target="_blank" className="flex items-center justify-between bg-white/10 p-2 px-4 rounded-xl hover:bg-yellow-400 hover:text-black"><span>График</span> <Icon name="external-link" size={14}/></a>
                                                <div className="grid grid-cols-3 gap-2">
                                                    <a href="#" className="bg-white/5 p-2 rounded text-[10px] text-center border border-white/10 hover:border-yellow-400">1 ГР</a>
                                                    <a href="#" className="bg-white/5 p-2 rounded text-[10px] text-center border border-white/10 hover:border-yellow-400">2 ГР</a>
                                                    <a href="#" className="bg-white/5 p-2 rounded text-[10px] text-center border border-white/10 hover:border-yellow-400">НОЧЬ</a>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {currentSlide === 3 && (
                                <div>
                                    <h2 className="text-4xl font-black uppercase mb-12 border-l-[10px] border-yellow-400 pl-6 italic uppercase">🛠 Твой Арсенал</h2>
                                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-6">
                                        <a href="https://svoicrm.ru/stream/?login=yes" target="_blank" className="bg-gray-50 p-8 rounded-[32px] border-2 border-transparent hover:border-yellow-400 transition-all text-center group shadow-sm">
                                            <div className="bg-black text-yellow-400 p-5 rounded-2xl mb-4 group-hover:scale-110 transition-transform inline-block"><Icon name="message-square" size={32}/></div>
                                            <h4 className="font-black italic uppercase">Bitrix24</h4>
                                        </a>
                                        <div className="bg-gray-50 p-8 rounded-[32px] opacity-30 text-center">
                                            <div className="bg-gray-400 text-white p-5 rounded-2xl mb-4 inline-block"><Icon name="shield-check" size={32}/></div>
                                            <h4 className="font-black italic uppercase">DFS</h4>
                                        </div>
                                        <a href="https://svoi.motivity.ru/" target="_blank" className="bg-gray-50 p-8 rounded-[32px] border-2 border-transparent hover:border-yellow-400 transition-all text-center group shadow-sm">
                                            <div className="bg-black text-yellow-400 p-5 rounded-2xl mb-4 group-hover:scale-110 transition-transform inline-block"><Icon name="book-open" size={32}/></div>
                                            <h4 className="font-black italic uppercase">Motivity</h4>
                                        </a>
                                        <div className="bg-gray-50 p-8 rounded-[32px] opacity-30 text-center">
                                            <div className="bg-gray-400 text-white p-5 rounded-2xl mb-4 inline-block"><Icon name="users" size={32}/></div>
                                            <h4 className="font-black italic uppercase">Telegram</h4>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {currentSlide === 4 && (
                                <div>
                                    <h2 className="text-3xl font-black uppercase mb-10 border-l-[10px] border-yellow-400 pl-6 italic uppercase">🧭 Маршрутизация</h2>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 italic font-bold">
                                        <div className="p-8 border-4 border-gray-100 rounded-[32px] bg-blue-50/20"><h3 className="text-blue-600 uppercase font-black mb-4">В ТП</h3><p className="text-sm leading-relaxed">Смена оплаты, вывод денег, лицензии, подходимость авто под тарифы парка.</p></div>
                                        <div className="p-8 border-4 border-gray-100 rounded-[32px] bg-red-50/20"><h3 className="text-red-600 uppercase font-black mb-4">Яндекс Про</h3><p className="text-sm leading-relaxed">Неоплата заказов, жалобы на пассажиров, ошибки активности, ФИО.</p></div>
                                        <div className="p-8 border-4 border-gray-100 rounded-[32px] bg-purple-50/20"><h3 className="text-purple-600 uppercase font-black mb-4">РГ / Старшие</h3><p className="text-sm leading-relaxed">Лимиты 30к, конфликты, системные сбои и неординарные кейсы.</p></div>
                                        <div className="p-8 border-4 border-gray-100 rounded-[32px] bg-orange-50/20"><h3 className="text-orange-600 uppercase font-black mb-4">Фин. отдел</h3><p className="text-sm leading-relaxed">Кнопка вывода, пополнение баланса, антифрод и перенос баланса.</p></div>
                                    </div>
                                </div>
                            )}

                            {currentSlide === 5 && (
                                <div className="flex flex-col items-center">
                                    <h2 className="text-4xl font-black uppercase mb-12 self-start border-l-[10px] border-yellow-400 pl-6 italic">💬 Культура общения</h2>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-10 w-full italic">
                                        <div className="space-y-4">
                                            <p className="text-green-500 font-black uppercase text-xs tracking-widest">МЫ ВСЕГДА:</p>
                                            <div className="p-6 bg-gray-50 rounded-2xl border-l-8 border-green-500 font-bold text-lg shadow-sm">• Пишем строго на «Вы»</div>
                                            <div className="p-6 bg-gray-50 rounded-2xl border-l-8 border-green-500 font-bold text-lg shadow-sm">• Сохраняем деловой тон</div>
                                            <div className="p-6 bg-gray-50 rounded-2xl border-l-8 border-green-500 font-bold text-lg shadow-sm">• Проверяем ошибки</div>
                                        </div>
                                        <div className="space-y-4 opacity-70">
                                            <p className="text-red-500 font-black uppercase text-xs tracking-widest">ЗАПРЕЩЕНО:</p>
                                            <div className="p-6 bg-gray-50 rounded-2xl border-l-8 border-red-500 font-bold text-lg">• Метафоры / Пословицы</div>
                                            <div className="p-6 bg-gray-50 rounded-2xl border-l-8 border-red-500 font-bold text-lg">• Закрывать без ответа</div>
                                            <div className="p-6 bg-gray-50 rounded-2xl border-l-8 border-red-500 font-bold text-lg">• Грубость и споры</div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {currentSlide === 6 && (
                                <div className="flex flex-col items-center justify-center h-full">
                                    <h2 className="text-4xl font-black uppercase mb-16 self-start border-l-[10px] border-yellow-400 pl-6 italic">📋 Режим смены</h2>
                                    <div className="space-y-12 w-full max-w-xl font-black italic">
                                        <div className="flex gap-10 items-center"><div className="bg-black text-yellow-400 p-6 rounded-[30px] w-32 text-center shadow-xl text-2xl">08:59</div><div className="text-2xl">СТАРТ В BITRIX24</div></div>
                                        <div className="flex gap-10 items-center"><div className="bg-yellow-400 text-black p-6 rounded-[30px] w-32 text-center shadow-xl text-2xl uppercase">BREAK</div><div className="text-2xl">ПЕРЕРЫВЫ (2x30 + 3x10)</div></div>
                                        <div className="flex gap-10 items-center"><div className="bg-black text-yellow-400 p-6 rounded-[30px] w-32 text-center shadow-xl text-2xl">21:00</div><div className="text-2xl">КОНЕЦ СМЕНЫ</div></div>
                                    </div>
                                </div>
                            )}

                            {currentSlide === 7 && (
                                <div>
                                    <h2 className="text-3xl font-black uppercase mb-10 border-l-[10px] border-yellow-400 pl-6 italic">👥 Твоя поддержка</h2>
                                    <div className="grid grid-cols-2 lg:grid-cols-3 gap-4 font-bold">
                                        {[
                                            { name: "Данил Брюхин", role: "РО Клиентский сервис", handle: "@d_breww", url: "https://t.me/d_breww", type: "gold" },
                                            { name: "Ангелина Мешкова", role: "РО Обучения", handle: "@mOorgenstern", url: "https://t.me/mOorgenstern", type: "gold" },
                                            { name: "Анастасия Поспелова", role: "Бизнес тренер", handle: "@the_aleksandrova", url: "https://t.me/the_aleksandrova", type: "white" },
                                            { name: "Дарья Домрачева", role: "Бизнес тренер", handle: "@Kewassi", url: "https://t.me/Kewassi", type: "white" },
                                            { name: "Ирина Коноваленко", role: "Бизнес тренер", handle: "@RiKokoko", url: "https://t.me/RiKokoko", type: "white" },
                                            { name: "Дмитрий Черевко", role: "Руководитель группы", handle: "@dmitriy_svoi", url: "https://t.me/dmitriy_svoi", type: "gold" },
                                            { name: "Дмитрий Щеглов", role: "Руководитель группы", handle: "@Shcheglov_98", url: "https://t.me/Shcheglov_98", type: "gold" }
                                        ].map((p, i) => (
                                            <div key={i} className={`p-5 rounded-3xl border-b-4 ${p.type === 'gold' ? 'border-yellow-400 bg-gray-50' : 'border-gray-200 bg-white shadow-sm'}`}>
                                                <p className="font-black text-black uppercase italic text-sm">{p.name}</p>
                                                <p className="text-[9px] text-gray-400 uppercase mb-4 tracking-widest">{p.role}</p>
                                                <a href={p.url} target="_blank" className="bg-black text-yellow-400 px-3 py-1 rounded-lg text-[10px] font-black inline-block hover:scale-105 transition-transform">{p.handle}</a>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {currentSlide === 8 && (
                                <div>
                                    <h2 className="text-3xl font-black uppercase mb-8 border-l-[10px] border-yellow-400 pl-6 italic">🔗 Полезные разделы Motivity</h2>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3 font-bold italic">
                                        {[
                                            { name: 'Диспетчерская', url: 'https://svoi.motivity.ru/study/lessons/55' },
                                            { name: 'Bitrix24 (Урок)', url: 'https://svoi.motivity.ru/study/lessons/76' },
                                            { name: 'Отработка негатива', url: 'https://svoi.motivity.ru/study/lessons/312' },
                                            { name: 'Фин. регламент', url: 'https://svoi.motivity.ru/library/file/377' },
                                            { name: 'Самозанятость и ИП', url: 'https://svoi.motivity.ru/study/lessons/169' },
                                            { name: 'Тренажер Яндекс Про', url: 'https://svoi.motivity.ru/study/lessons/116' },
                                            { name: 'Смена авто', url: 'https://svoi.motivity.ru/library/file/263' },
                                            { name: 'Классификатор', url: 'https://svoi.motivity.ru/study/lessons/113' }
                                        ].map((item, idx) => (
                                            <a key={idx} href={item.url} target="_blank" className="p-4 bg-gray-50 rounded-2xl border border-gray-100 hover:bg-yellow-400 flex justify-between group transition-all">
                                                <span className="group-hover:text-black">{item.name}</span> <Icon name="external-link" size={14}/>
                                            </a>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {currentSlide === 9 && (
                                <div className="flex flex-col items-center justify-center h-full text-center bg-yellow-400 rounded-[32px] p-10 shadow-2xl">
                                    <Icon name="shield-check" size={80} className="mb-8 text-black" />
                                    <h2 className="text-6xl font-black uppercase italic leading-none mb-6">ТЫ ГОТОВ <br/><span className="text-white">К РАБОТЕ!</span></h2>
                                    <p className="text-xl max-w-xl font-bold italic mb-12 uppercase tracking-tighter text-black/70">Обучение завершено. Переходи к шпаргалке таксопарка ниже.</p>
                                    <button 
                                        onClick={() => cheatSheetRef.current?.scrollIntoView({ behavior: 'smooth' })}
                                        className="bg-black text-yellow-400 px-16 py-6 rounded-3xl font-black uppercase italic tracking-widest hover:scale-105 transition-all shadow-2xl flex items-center gap-4 text-xl"
                                    >
                                        Открыть шпаргалку <Icon name="chevron-down" size={32} />
                                    </button>
                                </div>
                            )}
                        </div>

                        <div className="p-8 flex justify-end gap-4 relative z-50">
                            <button onClick={() => setCurrentSlide(p => Math.max(1, p-1))} disabled={currentSlide === 1} className="p-5 rounded-3xl bg-gray-100 hover:bg-black hover:text-yellow-400 disabled:opacity-20 transition-all shadow-md"><Icon name="chevron-left" size={32}/></button>
                            <button onClick={() => setCurrentSlide(p => Math.min(totalSlides, p+1))} disabled={currentSlide === totalSlides} className="p-5 rounded-3xl bg-yellow-400 text-black hover:scale-110 shadow-lg font-black transition-all border border-black/10"><Icon name="chevron-right" size={32}/></button>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-gray-50 overflow-x-hidden selection:bg-yellow-400 selection:text-black">
                    <header className="bg-[#1a1a1a] p-5 border-b-4 border-yellow-400 flex justify-between items-center sticky top-0 z-[100] shadow-xl">
                        <div className="flex items-center gap-6">
                            <img src="https://taxi-svoi.ru/wp-content/themes/taxi/img/logo.png" alt="СВОИ" className="h-10" />
                            <div className="hidden lg:block text-white/40 font-black italic uppercase text-[9px] tracking-widest leading-tight">Сертифицированный партнер <br/>Яндекс.Такси с 2011 года</div>
                        </div>
                        {view !== 'main' && (
                            <button onClick={goBack} className="bg-yellow-400 text-black px-8 py-2 rounded-xl font-black uppercase italic text-xs border-2 border-black hover:scale-110 transition-all">На главную</button>
                        )}
                    </header>

                    <div className="relative h-24 bg-white border-b-8 border-black overflow-hidden shadow-inner">
                        <div className="bg-dashed-line"></div>
                        <div className="absolute top-1/2 -translate-y-1/2 animate-drive-slow flex items-center gap-4">
                            <div className="bg-black text-yellow-400 px-6 py-2 rounded-2xl font-black italic uppercase text-xs flex items-center gap-3 shadow-2xl border-2 border-yellow-400/20">
                                <Icon name="car" size={20} className="animate-bounce" /> СВОИ ТАКСИ
                            </div>
                            <div className="w-80 h-1 bg-black/10 rounded-full"></div>
                        </div>
                    </div>

                    {view === 'main' && (
                        <main className="max-w-7xl mx-auto py-24 px-8 animate-in fade-in duration-1000">
                            <div className="flex flex-col md:flex-row items-end justify-between gap-10 mb-24 border-b-8 border-black pb-10">
                                <div className="max-w-2xl relative">
                                    <div className="absolute -top-10 -left-6 bg-black text-yellow-400 px-4 py-1 rounded-full font-black text-[10px] uppercase italic tracking-widest shadow-lg">Internal Ecosystem</div>
                                    <h1 className="text-7xl md:text-[120px] font-black italic tracking-tighter uppercase leading-[0.75] text-black">БУДЬ <br/><span className="text-yellow-400 bg-black px-4 inline-block transform -skew-x-6">СВОИМ</span> <br/>В КОМАНДЕ.</h1>
                                </div>
                                <div className="text-right">
                                    <p className="text-gray-400 font-black italic uppercase text-xs tracking-tighter leading-tight">Официальный портал <br/>обучения СВОИ</p>
                                    <div className="w-24 h-2 bg-yellow-400 mt-2 ml-auto"></div>
                                </div>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-4 gap-8">
                                {DEPARTMENTS.map(dept => (
                                    <button key={dept.id} onClick={() => handleDeptSelect(dept)} className="group bg-white p-12 rounded-[60px] shadow-xl border-b-[12px] border-gray-100 hover:border-yellow-400 transition-all hover:-translate-y-4 text-center overflow-hidden relative border border-gray-50">
                                        <div className="bg-black text-yellow-400 w-16 h-16 rounded-3xl flex items-center justify-center mx-auto mb-8 shadow-2xl group-hover:rotate-12 transition-transform">
                                            <Icon name={dept.icon} size={32} />
                                        </div>
                                        <h3 className="text-2xl font-black italic uppercase mb-2 tracking-tighter text-black">{dept.title}</h3>
                                        <p className="text-gray-400 text-[10px] font-black uppercase tracking-widest italic">{dept.description}</p>
                                    </button>
                                ))}
                            </div>
                        </main>
                    )}

                    {view === 'auth' && (
                        <main className="max-w-xl mx-auto py-32 px-8 animate-in zoom-in-95 duration-500">
                            <div className="bg-white p-16 rounded-[80px] shadow-2xl text-center border-[12px] border-black relative overflow-hidden">
                                <div className="absolute top-0 right-0 w-32 h-32 bg-yellow-400 -translate-y-16 translate-x-16 rotate-45 opacity-50"></div>
                                <Icon name="lock" size={60} className="mx-auto mb-10 text-black" />
                                <h2 className="text-4xl font-black uppercase italic mb-2 tracking-tighter">Вход в сектор</h2>
                                <p className="text-gray-400 mb-12 italic text-lg font-black uppercase tracking-widest tracking-tighter underline decoration-yellow-400 decoration-8">{selectedDept.title}</p>
                                <form onSubmit={handlePinSubmit} className="space-y-12">
                                    <input type="password" maxLength="4" placeholder="••••" autoFocus value={pinInput} onChange={e => setPinInput(e.target.value)} className="w-full bg-gray-50 text-center text-6xl py-10 rounded-[40px] border-4 border-gray-100 focus:border-yellow-400 transition-all font-black shadow-inner" />
                                    {error && <p className="text-red-500 font-black uppercase animate-shake tracking-widest">Код не принят</p>}
                                    <button type="submit" className="w-full bg-yellow-400 text-black py-7 rounded-[40px] font-black uppercase italic text-2xl shadow-xl hover:scale-105 transition-all">Авторизация</button>
                                </form>
                            </div>
                        </main>
                    )}

                    {view === 'content' && (
                        <main className="animate-in slide-in-from-bottom-10 duration-1000">
                            <div className="bg-black text-yellow-400 py-4 text-center sticky top-[80px] z-[90] shadow-2xl font-black text-[10px] uppercase tracking-[0.5em] italic">Access Granted • {selectedDept.title} • Employee Profile: Active</div>
                            <div className="py-20">
                                <Presentation />
                                <div ref={cheatSheetRef} className="w-full max-w-6xl mx-auto px-4 pb-40 text-black">
                                    <h2 className="text-7xl font-black italic uppercase tracking-tighter mb-20 text-center">БАЗА <span className="bg-yellow-400 px-4">ЗНАНИЙ</span> СВОИ</h2>
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-10">
                                        <div className="p-10 bg-white rounded-[50px] shadow-2xl border border-gray-100"><Icon name="credit-card" size={60} className="text-yellow-400 mb-8" /><h3 className="text-2xl font-black uppercase italic mb-6">Тарифы</h3><p className="text-gray-400 font-bold uppercase italic text-xs tracking-widest border-b-4 border-dashed border-yellow-400 pb-2">Ожидание информации...</p></div>
                                        <div className="p-10 bg-white rounded-[50px] shadow-2xl border border-gray-100"><Icon name="car" size={60} className="text-yellow-400 mb-8" /><h3 className="text-2xl font-black uppercase italic mb-6">Цвета и ГОСТ</h3><p className="text-gray-400 font-bold uppercase italic text-xs tracking-widest border-b-4 border-dashed border-yellow-400 pb-2">Ожидание информации...</p></div>
                                        <div className="p-10 bg-white rounded-[50px] shadow-2xl border border-gray-100"><Icon name="briefcase" size={60} className="text-yellow-400 mb-8" /><h3 className="text-2xl font-black uppercase italic mb-6">Юр. база</h3><p className="text-gray-400 font-bold uppercase italic text-xs tracking-widest border-b-4 border-dashed border-yellow-400 pb-2">Ожидание информации...</p></div>
                                    </div>
                                </div>
                            </div>
                        </main>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
