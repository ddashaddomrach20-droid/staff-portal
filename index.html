<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корпоративный портал СВОИ</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React, ReactDOM, Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; margin: 0; overflow-x: hidden; scroll-behavior: smooth; }
        @keyframes driveFull {
            0% { transform: translateX(-150%); }
            100% { transform: translateX(1200%); }
        }
        .animate-drive-slow { animation: driveFull 45s linear infinite; }
        .bg-dashed-line {
            background-image: linear-gradient(to right, #000 50%, transparent 50%);
            background-size: 40px 2px;
            height: 2px;
            width: 100%;
            opacity: 0.1;
            position: absolute; top: 50%;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .animate-shake { animation: shake 0.15s ease-in-out 0s 2; }
        .slide-content::-webkit-scrollbar { width: 6px; }
        .slide-content::-webkit-scrollbar-track { background: #f1f1f1; }
        .slide-content::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
        .text-shadow { text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }
        
        /* Анимация бегущей строки */
        .animate-marquee {
            display: inline-block;
            white-space: nowrap;
            animation: marquee 20s linear infinite;
        }
        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const DEPARTMENTS = [
            { id: 'tp_chats', title: 'ТП Чаты', icon: 'message-square', pin: '1111', description: 'Поддержка водителей в чатах' },
            { id: 'tp_calls', title: 'ТП Звонки', icon: 'phone', pin: '2222', description: 'Голосовая поддержка' },
            { id: 'op_chats', title: 'ОП Чаты', icon: 'users', pin: '3333', description: 'Продажи в мессенджерах' },
            { id: 'op_requests', title: 'ОП Заявки', icon: 'file-text', pin: '4444', description: 'Обработка входящих лидов' }
        ];

        function App() {
            const [view, setView] = useState('main');
            const [selectedDept, setSelectedDept] = useState(null);
            const [pinInput, setPinInput] = useState('');
            const [error, setError] = useState(false);
            const [currentSlide, setCurrentSlide] = useState(1);
            const cheatSheetRef = useRef(null);
            const totalSlides = 9;

            const handleDeptSelect = (dept) => { setSelectedDept(dept); setView('auth'); setPinInput(''); setError(false); };
            const goBack = () => { setView('main'); setSelectedDept(null); window.scrollTo({ top: 0, behavior: 'smooth' }); };
            
            const handlePinSubmit = (e) => {
                e.preventDefault();
                if (pinInput === selectedDept.pin) { setView('content'); setCurrentSlide(1); window.scrollTo({ top: 0, behavior: 'smooth' }); }
                else { setError(true); setPinInput(''); }
            };

            const scrollToSection = (id) => {
                const element = document.getElementById(id);
                if (element) {
                    const offset = 120; // Чтобы заголовок не прятался под липкий хедер
                    const bodyRect = document.body.getBoundingClientRect().top;
                    const elementRect = element.getBoundingClientRect().top;
                    const elementPosition = elementRect - bodyRect;
                    const offsetPosition = elementPosition - offset;

                    window.scrollTo({
                        top: offsetPosition,
                        behavior: "smooth"
                    });
                }
            };

            const Presentation = () => (
                <div className="w-full max-w-6xl mx-auto mb-16 px-4 font-black italic">
                    <div className="relative overflow-hidden bg-white rounded-[40px] shadow-2xl border border-gray-100 min-h-[720px] flex flex-col">
                        <div className="absolute top-0 left-0 w-full h-2 bg-gray-100 z-50">
                            <div className="h-full bg-yellow-400 transition-all duration-300 shadow-[0_0_10px_#facc15]" style={{ width: `${(currentSlide / totalSlides) * 100}%` }}></div>
                        </div>

                        <div className="flex-1 p-10 slide-content overflow-y-auto relative">
                            {currentSlide === 1 && (
                                <div className="flex flex-col items-center justify-center h-full text-center py-20 animate-in fade-in duration-500">

                                </div>
                            )}

                            {currentSlide === 2 && (

                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-10">
                                        <table className="w-full text-sm rounded-2xl overflow-hidden shadow-xl border border-gray-100 font-black">
                                            <tbody>
                                                <tr className="bg-green-500 text-white uppercase"><td className="p-4">100%+ — Мастер</td></tr>
                                                <tr className="bg-green-50"><td className="p-4 border-b border-gray-100 text-green-800 underline">97% – 100% — Отлично</td></tr>
                                                <tr className="bg-yellow-50"><td className="p-4 border-b border-gray-100 text-yellow-700 underline">95% – 97% — Хорошо</td></tr>

                                        </table>

                                    </div>

                                </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">

                                        <div className="p-8 border-4 border-gray-100 rounded-[40px] bg-orange-50/20"><h3 className="text-orange-600 uppercase mb-4 tracking-tighter text-xl underline decoration-orange-200 font-black">Фин. отдел</h3><p className="text-sm leading-relaxed text-gray-600 font-black italic">Ошибки кнопки вывода, пополнение баланса, кейсы по антифроду и ручной перенос баланса.</p></div>
                                    </div>
                                </div>
                            )}

                            {/* СЛАЙД 5: КУЛЬТУРА ОБЩЕНИЯ - ОБНОВЛЕНО */}

                                <div className="flex flex-col items-center animate-in slide-in-from-right duration-300 font-black italic">
                                    <h2 className="text-4xl font-black uppercase mb-12 self-start border-l-[10px] border-yellow-400 pl-6 underline decoration-black decoration-4 font-black">💬 Культура общения</h2>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-10 w-full italic">

                                            <p className="text-green-500 font-black uppercase text-[10px] tracking-widest mb-2 italic">МЫ ВСЕГДА:</p>
                                            <div className="p-4 bg-gray-50 rounded-[30px] border-l-8 border-green-500 text-lg shadow-sm tracking-tight">• Общаемся на «Вы»</div>

                                            <div className="p-4 bg-gray-50 rounded-[30px] border-l-8 border-green-500 text-lg shadow-sm tracking-tight">• Проверяем орфографию</div>
                                            <div className="p-4 bg-gray-50 rounded-[30px] border-l-8 border-green-500 text-lg shadow-sm tracking-tight">• Не пишем длинные текста</div>
                                            <div className="p-4 bg-gray-50 rounded-[30px] border-l-8 border-green-500 text-lg shadow-sm tracking-tight">• Отвечаем строго по делу</div>
                                        </div>

                                            <div className="p-4 bg-gray-50 rounded-[30px] border-l-8 border-red-500 text-lg leading-none font-black italic">• Спорить</div>
