<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Корпоративный портал СВОИ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; margin: 0; overflow-x: hidden; scroll-behavior: smooth; }

        @keyframes driveFull {
            0% { transform: translateX(-150%); }
            100% { transform: translateX(1200%); }
        }
        .animate-drive-slow { animation: driveFull 25s linear infinite; }

        .bg-dashed-line {
            background-image: linear-gradient(to right, #000 50%, transparent 50%);
            background-size: 40px 2px;
            height: 2px;
            width: 100%;
            opacity: 0.1;
            position: absolute;
            top: 50%;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .animate-shake { animation: shake 0.15s ease-in-out 0s 2; }

        .slide-content::-webkit-scrollbar { width: 6px; }
        .slide-content::-webkit-scrollbar-track { background: #f1f1f1; }
        .slide-content::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
        .text-shadow { text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }

        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        .animate-marquee {
            display: inline-block;
            white-space: nowrap;
            animation: marquee 20s linear infinite;
        }

        /* Модальное окно поиска */
        .search-modal { 
            position: fixed; 
            top: 100px; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 9999; 
            width: 90%; 
            max-width: 600px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const DEPARTMENTS = [
            { id: 'tp_chats', title: 'ТП Чаты', icon: 'message-square', pin: '1111', description: 'Поддержка водителей в чатах' },
            { id: 'tp_calls', title: 'ТП Звонки', icon: 'phone', pin: '2222', description: 'Голосовая поддержка' },
            { id: 'op_chats', title: 'ОП Чаты', icon: 'users', pin: '3333', description: 'Продажи в мессенджерах' },
            { id: 'op_requests', title: 'ОП Заявки', icon: 'file-text', pin: '4444', description: 'Обработка входящих лидов' },
            { id: 'new_driver', title: 'Новый водитель', icon: 'user-plus', pin: '5555', description: 'Подключение и старт работы' }
        ];

        // Презентации для каждого отдела
        const PRESENTATIONS = {
            tp_chats: {
                slides: ['logo', 'kpi-chats', 'arsenal', 'routing', 'culture-chats', 'schedule-chats', 'team-chats', 'links', 'final'],
                totalSlides: 9
            },
            tp_calls: {
                slides: ['logo', 'adaptation-calls', 'arsenal', 'routing', 'culture-calls', 'schedule-calls', 'team-calls', 'links', 'final'],
                totalSlides: 9
            },
            op_chats: {
                slides: ['logo', 'kpi-op-chats', 'arsenal', 'routing-op-chats', 'culture-op-chats', 'schedule-op-chats', 'team-op-chats', 'links-op-chats', 'final'],
                totalSlides: 9
            },
            op_requests: {
                slides: ['logo', 'kpi-op-requests', 'arsenal', 'culture-op-requests', 'schedule-op-requests', 'team-op-requests', 'links-op-requests', 'final'],
                totalSlides: 8
            },
            new_driver: {
                slides: ['logo', 'tasks-new-driver', 'schedule-new-driver', 'team-new-driver', 'links-new-driver', 'arsenal', 'final'],
                totalSlides: 7
            }
        };

        function App() {
            const loadState = () => {
                try {
                    const savedView = localStorage.getItem('staffPortalView');
                    const savedDeptId = localStorage.getItem('staffPortalDept');
                    const savedSlide = localStorage.getItem('staffPortalSlide');
                    
                    const dept = savedDeptId ? DEPARTMENTS.find(d => d.id === savedDeptId) : null;
                    const presentation = dept ? PRESENTATIONS[dept.id] : null;
                    
                    return {
                        view: savedView || 'main',
                        selectedDept: dept,
                        currentSlide: savedSlide && presentation ? Math.min(parseInt(savedSlide), presentation.totalSlides) : 1
                    };
                } catch (e) {
                    return { view: 'main', selectedDept: null, currentSlide: 1 };
                }
            };

            const initialState = loadState();

            const [view, setView] = useState(initialState.view);
            const [selectedDept, setSelectedDept] = useState(initialState.selectedDept);
            const [pinInput, setPinInput] = useState('');
            const [error, setError] = useState(false);
            const [currentSlide, setCurrentSlide] = useState(initialState.currentSlide);
            const [searchOpen, setSearchOpen] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [searchResults, setSearchResults] = useState([]);
            const cheatSheetRef = useRef(null);

            const presentation = selectedDept ? PRESENTATIONS[selectedDept.id] : null;
            const totalSlides = presentation ? presentation.totalSlides : 9;

            // Горячие клавиши
            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.key === 'Escape' && searchOpen) {
                        setSearchOpen(false);
                    }
                };
                document.addEventListener('keydown', handleKeyDown);
                return () => document.removeEventListener('keydown', handleKeyDown);
            }, [searchOpen]);

            // Поиск по шпаргалке
            useEffect(() => {
                if (searchQuery.length < 2) {
                    setSearchResults([]);
                    return;
                }
                
                const sections = [
                    { id: 'commission', name: 'Комиссии парка', keywords: ['комиссия', 'парк', 'такси', 'курьер', 'смз', 'ип', 'процент'] },
                    { id: 'bonuses', name: 'Бонусы парков', keywords: ['бонус', 'приветственный', 'поездка', 'друг', 'реферал'] },
                    { id: 'minivan', name: 'Минивэн / Cruise', keywords: ['минивэн', 'cruise', 'премиум', 'мерседес'] },
                    { id: 'license', name: 'Лицензия / Разрешение', keywords: ['лицензия', 'разрешение', 'фгис', 'перевозчик', 'балл'] },
                    { id: 'colors', name: 'Цвет авто МСК/МО', keywords: ['цвет', 'жёлтый', 'белый', 'оклейка', 'мск', 'мо'] },
                    { id: 'contract', name: 'Договор фрахтования', keywords: ['договор', 'фрахт', 'фрахтовщик', 'карточка'] },
                    { id: 'osago', name: 'ОСАГО/ОСГОП', keywords: ['осаго', 'осгоп', 'страх', 'страховка', 'полис'] },
                    { id: 'kisart', name: 'КИС АРТ', keywords: ['кис', 'арт', 'регистрация', 'такси', 'медосмотр'] },
                    { id: 'smz', name: 'СМЗ и ИП', keywords: ['смз', 'самозанят', 'ип', 'налог', 'патент', 'автоуплата'] }
                ];

                const query = searchQuery.toLowerCase();
                const results = sections.filter(section => 
                    section.name.toLowerCase().includes(query) ||
                    section.keywords.some(keyword => keyword.includes(query))
                );
                
                setSearchResults(results);
            }, [searchQuery]);

            useEffect(() => {
                localStorage.setItem('staffPortalView', view);
                if (selectedDept) {
                    localStorage.setItem('staffPortalDept', selectedDept.id);
                } else {
                    localStorage.removeItem('staffPortalDept');
                }
                localStorage.setItem('staffPortalSlide', currentSlide.toString());
            }, [view, selectedDept, currentSlide]);

            const handleDeptSelect = (dept) => { 
                setSelectedDept(dept); 
                setView('auth'); 
                setPinInput(''); 
                setError(false);
                setCurrentSlide(1);
            };
            
            const goBack = () => { 
                setView('main'); 
                setSelectedDept(null); 
                window.scrollTo({ top: 0, behavior: 'smooth' }); 
            };

            const handlePinSubmit = (e) => {
                e.preventDefault();
                if (pinInput === selectedDept.pin) { 
                    setView('qcontent'); 
                    setCurrentSlide(1); 
                    window.scrollTo({ top: 0, behavior: 'smooth' }); 
                } else { 
                    setError(true); 
                    setPinInput(''); 
                }
            };

            const scrollToSection = (id) => {
                const element = document.getElementById(id);
                if (element) {
                    const offset = 120;
                    const bodyRect = document.body.getBoundingClientRect().top;
                    const elementRect = element.getBoundingClientRect().top;
                    const elementPosition = elementRect - bodyRect;
                    const offsetPosition = elementPosition - offset;

                    window.scrollTo({
                        top: offsetPosition,
                        behavior: "smooth"
                    });
                }
            };

            const scrollToTop = () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const Presentation = () => {
                const slideType = presentation ? presentation.slides[currentSlide - 1] : null;

                const renderSlide = () => {
                    switch(slideType) {
                        case 'logo':
                            return (
                                <div className="flex flex-col items-center justify-center h-full text-center py-20 animate-in fade-in duration-500">
                                    <div className="absolute top-0 right-0 w-1/2 h-full bg-yellow-400 skew-x-[-15deg] translate-x-32 z-0 opacity-10"></div>
                                    <img src="view.png" alt="СВОИ" className="h-24 mb-8 relative z-10" />
                                    <h1 className="text-6xl md:text-8xl font-black uppercase tracking-tighter text-black relative z-10 italic">ГИД <span className="bg-black text-yellow-400 px-4">СВОИ</span><br/>ПОДДЕРЖКИ</h1>
                                    <p className="mt-6 text-gray-500 font-bold italic uppercase tracking-widest relative z-10">Оперативность • Качество • Спокойствие</p>
                                </div>
                            );

                        case 'tasks-new-driver':
                            return (
                                <div className="animate-in slide-in-from-right duration-300 font-black italic">
                                    <h2 className="text-4xl font-black uppercase mb-12 border-l-[10px] border-yellow-400 pl-6 underline decoration-black decoration-4 font-black">🎯 Твои задачи</h2>
                                    
                                    <div className="bg-gradient-to-br from-blue-50 to-indigo-50 p-8 rounded-[32px] border-4 border-blue-400 mb-6">
                                        <div className="flex items-start gap-4 mb-4">
                                            <div className="bg-blue-600 text-white p-3 rounded-xl"><Icon name="phone" size={32}/></div>
                                            <div>
                                                <h4 className="text-xl font-black uppercase mb-2">Обзвон этапов воронки</h4>
                                                <p className="text-sm text-gray-700 leading-relaxed">
                                                    Работа с новыми водителями на всех этапах воронки подключения.
                                                </p>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-gradient-to-br from-green-50 to-emerald-50 p-8 rounded-[32px] border-4 border-green-400 mb-6">
                                        <div className="flex items-start gap-4 mb-4">
                                            <div className="bg-green-600 text-white p-3 rounded-xl"><Icon name="message-circle" size={32}/></div>
                                            <div>
                                                <h4 className="text-xl font-black uppercase mb-2">Коммуникация с таксистами</h4>
                                                <p className="text-sm text-gray-700 leading-relaxed">
                                                    Прод-коммуникация с водителями, ориентирование по базовым запросам.
                                                </p>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div className="bg-yellow-50 p-6 rounded-[24px] border-4 border-yellow-400">
                                            <h4 className="font-black uppercase text-yellow-600 mb-3 text-sm flex items-center gap-2">
                                                <Icon name="target" size={24}/>
                                                Цель
                                            </h4>
                                            <p className="text-sm font-black text-gray-700">Помощь новым водителям в быстром старте работы в парке</p>
                                        </div>

                                        <div className="bg-purple-50 p-6 rounded-[24px] border-4 border-purple-400">
                                            <h4 className="font-black uppercase text-purple-600 mb-3 text-sm flex items-center gap-2">
                                                <Icon name="users" size={24}/>
                                                Результат
                                            </h4>
                                            <p className="text-sm font-black text-gray-700">Водитель подключён и готов к работе</p>
                                        </div>
                                    </div>
                                </div>
                            );

                        case 'kpi-chats':
                            return (
                                <div className="animate-in slide-in-from-right duration-300">
                                    <h2 className="text-3xl font-black uppercase mb-8 border-l-[10px] border-yellow-400 pl-6 underline decoration-black">📈 Твои показатели успеха</h2>
                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-10">
                                        <table className="w-full text-sm rounded-2xl overflow-hidden shadow-xl border border-gray-100 font-black">
                                            <tbody>
                                                <tr className="bg-green-500 text-white uppercase"><td className="p-4">100%+ — Мастер</td></tr>
                                                <tr className="bg-green-50"><td className="p-4 border-b border-gray-100 text-green-800 underline">97% – 100% — Отлично</td></tr>
                                                <tr className="bg-yellow-50"><td className="p-4 border-b border-gray-100 text-yellow-700 underline">95% – 97% — Хорошо</td></tr>
                                                <tr className="bg-orange-50 font-black"><td className="p-4 border-b border-gray-100">93% – 94% — Внимание</td></tr>
                                                <tr className="bg-red-600 text-white uppercase"><td className="p-4 font-black italic">Ниже 89% — Критично</td></tr>
                                            </tbody>
                                        </table>
                                        <div className="space-y-4">
                                            <div className="bg-gray-50 p-6 rounded-[32px] border-2 border-black shadow-inner uppercase text-sm font-black italic">
                                                <p className="text-yellow-500 mb-2 underline">Нормативы:</p>
                                                <p>• 100+ чатов за смену</p><p>• 5 минут — идеальный ответ</p><p className="text-red-600 underline mt-2 font-black italic">• Тесты — ОБЯЗАТЕЛЬНО</p>
                                            </div>
                                            <div className="bg-black text-white p-6 rounded-[32px] space-y-3 shadow-2xl font-black italic">
                                                <p className="text-yellow-400 uppercase text-[10px] tracking-widest text-center mb-4">Рабочие таблицы:</p>
                                                <a href="https://docs.google.com/spreadsheets/d/1huOBRKU2MLql9hys-kBqznj7srys_2UwM0CFTdeW0vg/edit#gid=0" target="_blank" className="flex items-center justify-between bg-white/10 p-3 rounded-xl hover:bg-yellow-400 hover:text-black transition-all"><span>График работы</span> <Icon name="external-link" size={14}/></a>
                                                <div className="grid grid-cols-3 gap-2">
                                                    <a href="https://docs.google.com/spreadsheets/d/1IMa9PdLiTkB6rwXilvM-wuNl6Zi3tcGf2xZt24ZI9mY/edit#gid=715446351" target="_blank" className="bg-white/5 p-2 rounded text-[10px] text-center border border-white/10 hover:border-yellow-400 font-black italic">1 ГР</a>
                                                    <a href="https://docs.google.com/spreadsheets/d/1PvbypdcAN0Nqnb5mt4M6eARiBkXu7ARf_WJsn5bRtRk/edit#gid=1362933848" target="_blank" className="bg-white/5 p-2 rounded text-[10px] text-center border border-white/10 hover:border-yellow-400 font-black italic">2 ГР</a>
                                                    <a href="https://docs.google.com/spreadsheets/d/1wdhc0l2puo9KZnGBX-hr7wyKZeCOCNuK0hUXySU4JcA/edit#gid=627104501" target="_blank" className="bg-white/5 p-2 rounded text-[10px] text-center border border-white/10 hover:border-yellow-400 font-black italic uppercase">Ночь</a>
                                                </div>
                                                <a href="https://docs.google.com/spreadsheets/d/1ZZdz7yBQWfYDBG9Y6BB5KsNuFDSGH5oExO_ICm6VBPc/edit#gid=0" target="_blank" className="block bg-yellow-400 text-black text-center p-3 rounded-xl uppercase text-xs shadow-lg italic">Мотивация (оплата)</a>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            );

                        case 'kpi-op-chats':
                            return (
                                <div className="animate-in slide-in-from-right duration-300">
                                    <h2 className="text-3xl font-black uppercase mb-8 border-l-[10px] border-yellow-400 pl-6 underline decoration-black">📈 Твои показатели успеха</h2>

                                    <div className="bg-gradient-to-br from-blue-50 to-indigo-50 p-8 rounded-[32px] border-4 border-blue-400 mb-6">
                                        <div className="flex items-center gap-4 mb-4">
                                            <div className="bg-blue-600 text-white p-3 rounded-xl"><Icon name="clock" size={32}/></div>
                                            <h4 className="text-xl font-black uppercase">Срок ответа на запрос</h4>
                                        </div>
                                        <p className="text-lg font-black text-gray-700 mb-4">Не более <span className="text-blue-600 text-2xl">5-9 минут</span></p>
                                        <div className="bg-white p-4 rounded-xl border-l-4 border-blue-500">
                                            <p className="text-sm font-black text-gray-700">В первую очередь необходимо уделить внимание разделу <span className="bg-blue-100 px-2 py-1 rounded">«В работе»</span>, так как водители ожидают вашего ответа.</p>
                                        </div>
                                    </div>

                                    <div className="bg-black text-white p-6 rounded-[32px] space-y-3 shadow-2xl font-black italic">
                                        <p className="text-yellow-400 uppercase text-[10px] tracking-widest text-center mb-4">Полезные таблицы:</p>
                                        <a href="https://docs.google.com/spreadsheets/d/1oT04DNfv6-EZY-50prB_zjD20wMAIj-cjMWX3ODy6Pk/edit?gid=520988885#gid=520988885" target="_blank" className="flex items-center justify-between bg-white/10 p-3 rounded-xl hover:bg-yellow-400 hover:text-black transition-all"><span>График работы</span> <Icon name="external-link" size={14}/></a>
                                        <a href="https://docs.google.com/spreadsheets/d/1w8dca4WS9bfCcQk_oldXY2kQrg8bgaYk/edit?usp=sharing" target="_blank" className="flex items-center justify-between bg-white/10 p-3 rounded-xl hover:bg-yellow-400 hover:text-black transition-all"><span>Мониторинг 1 группа</span> <Icon name="external-link" size={14}/></a>
                                        <a href="https://docs.google.com/spreadsheets/d/1_JRy5aGUrxCyQ3TPhShT9gB5r-kHcHOr/edit?usp=sharing" target="_blank" className="flex items-center justify-between bg-white/10 p-3 rounded-xl hover:bg-yellow-400 hover:text-black transition-all"><span>Мониторинг 2 группа</span> <Icon name="external-link" size={14}/></a>
                                        <a href="https://docs.google.com/spreadsheets/d/17bX0FnGQhXNVs7GGs6qCiypqZ4ta7iTB/edit?usp=sharing" target="_blank" className="flex items-center justify-between bg-white/10 p-3 rounded-xl hover:bg-yellow-400 hover:text-black transition-all"><span>Мониторинг ночь</span> <Icon name="external-link" size={14}/></a>
                                        <a href="https://docs.google.com/document/d/14KBMOEbk-EpOgzpX6Jzj28jecjXOJm3fzxgo-NUNYrQ/edit?tab=t.bixlpatt7pai" target="_blank" className="flex items-center justify-between bg-white/10 p-3 rounded-xl hover:bg-yellow-400 hover:text-black transition-all"><span>Мотивация</span> <Icon name="external-link" size={14}/></a>
                                    </div>
                                </div>
                            );

                        case 'kpi-op-requests':
                            return (
                                <div className="animate-in slide-in-from-right duration-300">
                                    <h2 className="text-3xl font-black uppercase mb-8 border-l-[10px] border-yellow-400 pl-6 underline decoration-black">📈 Твои показатели успеха</h2>

                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                                        <div className="bg-gradient-to-br from-blue-50 to-indigo-50 p-8 rounded-[32px] border-4 border-blue-400">
                                            <div className="flex items-center gap-4 mb-4">
                                                <div className="bg-blue-600 text-white p-3 rounded-xl"><Icon name="phone-incoming" size={32}/></div>
                                                <h4 className="text-xl font-black uppercase">Обработка трафика</h4>
                                            </div>
                                            <p className="text-sm font-black text-gray-700 mb-4">Обработка входящего трафика и оставленных заявок в голосовом режиме.</p>
                                        </div>

                                        <div className="bg-gradient-to-br from-green-50 to-emerald-50 p-8 rounded-[32px] border-4 border-green-400">
                                            <div className="flex items-center gap-4 mb-4">
                                                <div className="bg-green-600 text-white p-3 rounded-xl"><Icon name="refresh-cw" size={32}/></div>
                                                <h4 className="text-xl font-black uppercase">Работа с заявками</h4>
                                            </div>
                                            <p className="text-sm font-black text-gray-700">Работа с текущими заявками, находящимися в стадиях:</p>
                                            <div className="mt-3 space-y-2 text-xs font-black">
                                                <div className="bg-white p-2 rounded-lg border-l-4 border-orange-500">• Поздний звонок</div>
                                                <div className="bg-white p-2 rounded-lg border-l-4 border-red-500">• Недозвон</div>
                                                <div className="bg-white p-2 rounded-lg border-l-4 border-yellow-500">• Перезвонить позже</div>
                                                <div className="bg-white p-2 rounded-lg border-l-4 border-purple-500">• 2 круг</div>
                                                <div className="bg-white p-2 rounded-lg border-l-4 border-blue-500">• Пропущенный вызов</div>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-black text-white p-6 rounded-[32px] space-y-3 shadow-2xl font-black italic">
                                        <p className="text-yellow-400 uppercase text-[10px] tracking-widest text-center mb-4">Полезные таблицы:</p>
                                        <a href="https://docs.google.com/spreadsheets/d/1oT04DNfv6-EZY-50prB_zjD20wMAIj-cjMWX3ODy6Pk/edit?gid=520988885#gid=520988885" target="_blank" className="flex items-center justify-between bg-white/10 p-3 rounded-xl hover:bg-yellow-400 hover:text-black transition-all"><span>График работы</span> <Icon name="external-link" size={14}/></a>
                                    </div>
                                </div>
                            );

                        case 'adaptation-calls':

                                            <div className="bg-gradient-to-br from-yellow-50 to-amber-50 p-8 rounded-[32px] border-4 border-yellow-400 mb-8">
                                                <div className="flex items-center gap-4 mb-4">
                                                    <div className="bg-yellow-400 p-3 rounded-xl"><Icon name="car" size={32}/></div>
                                                    <h4 className="text-xl font-black uppercase">ОСАГО — для такси</h4>
                                                </div>
                                                <p className="text-sm text-gray-700 leading-relaxed font-black mb-4">
                                                    В полисе должна быть отметка <span className="bg-black text-yellow-400 px-2 py-1 rounded">«Такси»</span>.
                                                </p>
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div className="bg-white p-4 rounded-xl border-l-4 border-yellow-500">
                                                        <p className="text-[10px] text-yellow-600 uppercase mb-1">Срок</p>
                                                        <p className="text-sm font-black">На 1 день (Яндекс) или на длительный срок</p>
                                                    </div>
                                                    <div className="bg-white p-4 rounded-xl border-l-4 border-yellow-500">
                                                        <p className="text-[10px] text-yellow-600 uppercase mb-1">Контролирует</p>
                                                        <p className="text-sm font-black">ГИБДД</p>
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                <div className="bg-red-50 p-6 rounded-[24px] border-4 border-red-400">
                                                    <h4 className="font-black uppercase text-red-600 mb-3 text-sm flex items-center gap-2">
                                                        <Icon name="alert-triangle" size={24}/>
                                                        Нет ОСГОП
                                                    </h4>
                                                    <p className="text-sm font-black text-gray-700">Приостановление разрешения до 30 дней → аннулирование</p>
                                                </div>

                                                <div className="bg-orange-50 p-6 rounded-[24px] border-4 border-orange-400">
                                                    <h4 className="font-black uppercase text-orange-600 mb-3 text-sm flex items-center gap-2">
                                                        <Icon name="alert-circle" size={24}/>
                                                        Нет ОСАГО
                                                    </h4>
                                                    <p className="text-sm font-black text-gray-700">Штраф, задержание ТС, запрет эксплуатации</p>
                                                </div>
                                            </div>

                                            <div className="mt-8 bg-black text-yellow-400 p-6 rounded-[24px] border-4 border-yellow-400 text-center">
                                                <p className="font-black text-sm">Нет ОСГОП — риск лишения разрешения. Нет ОСАГО — штраф и запрет эксплуатации.</p>
                                            </div>
                                        </div>

                                        {/* 8. КИС АРТ */}
                                        <div id="kisart" className="bg-white p-12 rounded-[60px] shadow-2xl border border-gray-100">
                                            <div className="flex items-center gap-6 mb-10 border-b-8 border-yellow-400 pb-6">
                                                <Icon name="key" size={60} className="text-black" />
                                                <h3 className="text-5xl font-black uppercase tracking-tighter">КИС «АРТ»</h3>
                                            </div>

                                            <div className="bg-gradient-to-br from-purple-50 to-indigo-50 p-8 rounded-[32px] border-4 border-purple-400 mb-8">
                                                <div className="flex items-start gap-4 mb-4">
                                                    <div className="bg-purple-600 text-white p-3 rounded-xl"><Icon name="monitor" size={32}/></div>
                                                    <div>
                                                        <h4 className="text-xl font-black uppercase mb-2">Что такое КИС «АРТ»?</h4>
                                                        <p className="text-sm text-gray-700 leading-relaxed font-black">
                                                            Комплексная информационная система <span className="bg-white px-2 py-1 rounded">«Аналитика работы такси»</span>, запущенная правительством Москвы. Следит, чтобы водители не перерабатывали и вовремя проходили медицинские и технические осмотры.
                                                        </p>
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="bg-blue-50 p-6 rounded-[24px] border-4 border-blue-400 mb-8">
                                                <h4 className="font-black uppercase text-blue-600 mb-3 text-sm flex items-center gap-2">
                                                    <Icon name="users" size={24}/>
                                                    Для кого необходим
                                                </h4>
                                                <p className="text-sm font-black text-gray-700">Для водителей такси и курьеров, работающих в Москве и МО.</p>
                                            </div>

                                            <div className="bg-green-50 p-6 rounded-[24px] border-4 border-green-400 mb-8">
                                                <h4 className="font-black uppercase text-green-600 mb-3 text-sm flex items-center gap-2">
                                                    <Icon name="check-circle" size={24}/>
                                                    Регистрация
                                                </h4>
                                                <p className="text-sm font-black text-gray-700">Требуется <span className="bg-green-200 px-2 py-1 rounded">перед началом работы</span> для всех исполнителей (курьеров, водителей). В Яндекс Про нет установленного срока регистрации.</p>
                                            </div>

                                            <div className="bg-red-50 p-6 rounded-[24px] border-4 border-red-400">
                                                <h4 className="font-black uppercase text-red-600 mb-3 text-sm flex items-center gap-2">
                                                    <Icon name="alert-triangle" size={24}/>
                                                    Важно
                                                </h4>
                                                <p className="text-sm font-black text-gray-700">Отсутствие регистрации в КИС «АРТ» приводит к <span className="text-red-600 underline">блокировке доступа к заказам</span>.</p>
                                            </div>
                                        </div>

                                        {/* 9. СМЗ И ИП */}
                                        <div id="smz" className="bg-white p-12 rounded-[60px] shadow-2xl border border-gray-100">
                                            <div className="flex items-center gap-6 mb-10 border-b-8 border-yellow-400 pb-6">
                                                <Icon name="user-check" size={60} className="text-black" />
                                                <h3 className="text-5xl font-black uppercase tracking-tighter">СМЗ и ИП</h3>
                                            </div>

                                            <div className="bg-gradient-to-br from-green-50 to-emerald-50 p-8 rounded-[32px] border-4 border-green-400 mb-8">
                                                <div className="flex items-start gap-4 mb-4">
                                                    <div className="bg-green-600 text-white p-3 rounded-xl"><Icon name="percent" size={32}/></div>
                                                    <div>
                                                        <h4 className="text-xl font-black uppercase mb-2">Самозанятость (СМЗ)</h4>
                                                        <p className="text-sm text-gray-700 leading-relaxed font-black mb-4">
                                                            Налоговый режим для прямого сотрудничества с сервисом. Налог: <span className="bg-green-200 px-2 py-1 rounded">4%</span> (физлица) или <span className="bg-green-200 px-2 py-1 rounded">6%</span> (юрлица).
                                                        </p>
                                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                            <div className="bg-white p-4 rounded-xl border-l-4 border-green-500">
                                                                <p className="text-[10px] text-green-600 uppercase mb-1">Лимит дохода</p>
                                                                <p className="text-sm font-black">До 2,4 млн ₽ в год</p>
                                                            </div>
                                                            <div className="bg-white p-4 rounded-xl border-l-4 border-green-500">
                                                                <p className="text-[10px] text-green-600 uppercase mb-1">Кто может</p>
                                                                <p className="text-sm font-black">Граждане РФ и ЕАЭС (Казахстан, Беларусь, Армения, Киргизия)</p>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="bg-blue-50 p-6 rounded-[24px] border-4 border-blue-400 mb-8">
                                                <h4 className="font-black uppercase text-blue-600 mb-3 text-sm flex items-center gap-2">
                                                    <Icon name="briefcase" size={24}/>
                                                    Парковая самозанятость (ПСМЗ)
                                                </h4>
                                                <p className="text-sm font-black text-gray-700">Гибкий сценарий через таксопарк. Сочетает преимущества парка и СМЗ.</p>
                                            </div>

                                            <div className="bg-yellow-50 p-6 rounded-[24px] border-4 border-yellow-400 mb-8">
                                                <h4 className="font-black uppercase text-yellow-600 mb-3 text-sm flex items-center gap-2">
                                                    <Icon name="wallet" size={24}/>
                                                    Автоуплата налогов (СМЗ/ПСМЗ)
                                                </h4>
                                                <p className="text-sm font-black text-gray-700">Подключена по умолчанию в Яндекс Про. Сервис автоматически удерживает налог с заказов и бонусов, переводит в налоговую.</p>
                                            </div>

                                            <div className="bg-gradient-to-br from-purple-50 to-indigo-50 p-8 rounded-[32px] border-4 border-purple-400 mb-8">
                                                <div className="flex items-start gap-4 mb-4">
                                                    <div className="bg-purple-600 text-white p-3 rounded-xl"><Icon name="file-text" size={32}/></div>
                                                    <div>
                                                        <h4 className="text-xl font-black uppercase mb-2">ИП (Индивидуальный предприниматель)</h4>
                                                        <p className="text-sm text-gray-700 leading-relaxed font-black mb-4">
                                                            Прямое сотрудничество с сервисом. Выплаты на расчётный счёт ИП (начинается с <span className="bg-white px-2 py-1 rounded">40802...</span>).
                                                        </p>
                                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                            <div className="bg-white p-4 rounded-xl border-l-4 border-purple-500">
                                                                <p className="text-[10px] text-purple-600 uppercase mb-1">ОКВЭД</p>
                                                                <p className="text-sm font-black">49.32 (такси)</p>
                                                            </div>
                                                            <div className="bg-white p-4 rounded-xl border-l-4 border-purple-500">
                                                                <p className="text-[10px] text-purple-600 uppercase mb-1">Патент</p>
                                                                <p className="text-sm font-black">До 60 млн ₽ в год</p>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                                                <div className="bg-red-50 p-6 rounded-[24px] border-4 border-red-400">
                                                    <h4 className="font-black uppercase text-red-600 mb-3 text-sm flex items-center gap-2">
                                                        <Icon name="alert-triangle" size={24}/>
                                                        Ограничения
                                                    </h4>
                                                    <p className="text-sm font-black text-gray-700">Нельзя стать СМЗ, если доход за год > 2,4 млн ₽ или вы госслужащий.</p>
                                                </div>

                                                <div className="bg-orange-50 p-6 rounded-[24px] border-4 border-orange-400">
                                                    <h4 className="font-black uppercase text-orange-600 mb-3 text-sm flex items-center gap-2">
                                                        <Icon name="alert-circle" size={24}/>
                                                        Экс-сотрудники Яндекса
                                                    </h4>
                                                    <p className="text-sm font-black text-gray-700">Нельзя стать СМЗ/ИП, если менее 2 лет назад был трудовой договор с компанией Яндекса.</p>
                                                </div>
                                            </div>

                                            <div className="bg-gray-50 p-6 rounded-[24px] border-4 border-gray-300 mb-8">
                                                <h4 className="font-black uppercase text-gray-600 mb-3 text-sm flex items-center gap-2">
                                                    <Icon name="trending-down" size={24}/>
                                                    Штрафы за неподтверждение
                                                </h4>
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                    <div className="bg-white p-4 rounded-xl border-l-4 border-red-500">
                                                        <p className="text-sm font-black"><span className="text-red-600">-15 баллов:</span> Не подтверждён тип занятости (диспа такси)</p>
                                                    </div>
                                                    <div className="bg-white p-4 rounded-xl border-l-4 border-orange-500">
                                                        <p className="text-sm font-black"><span className="text-orange-600">-10 баллов:</span> Не подтверждён тип сотрудничества (Логистический парк)</p>
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="bg-black text-yellow-400 p-6 rounded-[24px] border-4 border-yellow-400">
                                                <h4 className="font-black uppercase mb-3 text-sm flex items-center gap-2">
                                                    <Icon name="info" size={24}/>
                                                    Важно для ИП
                                                </h4>
                                                <p className="font-black text-sm mb-2">❌ Автоуплаты для ИП НЕ существует. Налоги оплачиваются самостоятельно через налоговую или банк.</p>
                                                <p className="font-black text-sm">📄 Подписание закрывающих документов ≠ оплата налогов. Документы подписываются для вывода средств.</p>
                                            </div>
                                        </div>

                                    </div>
                                </div>
                            </div>
                        </main>
                    )}

                    {/* Модальное окно поиска */}
                    {searchOpen && (
                        <div className="search-modal" onClick={() => setSearchOpen(false)}>
                            <div className="bg-white rounded-3xl shadow-2xl border-4 border-yellow-400 overflow-hidden" onClick={e => e.stopPropagation()}>
                                <div className="p-4 border-b-4 border-gray-100 flex items-center gap-4">
                                    <Icon name="search" size={24} className="text-gray-400" />
                                    <input
                                        type="text"
                                        value={searchQuery}
                                        onChange={e => setSearchQuery(e.target.value)}
                                        placeholder="Поиск по шпаргалке..."
                                        className="flex-1 text-lg font-black outline-none text-black bg-transparent"
                                        autoFocus
                                    />
                                    <button onClick={() => setSearchOpen(false)} className="p-2 hover:bg-gray-100 rounded-xl transition-all">
                                        <Icon name="x" size={24} className="text-gray-400" />
                                    </button>
                                </div>
                                <div className="max-h-96 overflow-y-auto p-4">
                                    {searchQuery.length < 2 && (
                                        <p className="text-gray-400 text-center font-black italic">Введите минимум 2 символа для поиска</p>
                                    )}
                                    {searchResults.length === 0 && searchQuery.length >= 2 && (
                                        <p className="text-gray-400 text-center font-black italic">Ничего не найдено</p>
                                    )}
                                    {searchResults.map(result => (
                                        <button
                                            key={result.id}
                                            onClick={() => {
                                                scrollToSection(result.id);
                                                setSearchOpen(false);
                                                setSearchQuery('');
                                            }}
                                            className="w-full p-4 bg-gray-50 rounded-2xl border-2 border-gray-100 hover:border-yellow-400 hover:bg-white transition-all text-left mb-2 group"
                                        >
                                            <div className="flex items-center justify-between">
                                                <span className="text-black uppercase font-black text-sm">{result.name}</span>
                                                <Icon name="arrow-right" size={20} className="text-yellow-500 opacity-0 group-hover:opacity-100 transition-all" />
                                            </div>
                                        </button>
                                    ))}
                                </div>
                                <div className="p-3 bg-black text-yellow-400 text-center text-[10px] font-black uppercase tracking-widest">
                                    Нажмите на раздел для перехода
                                </div>
                            </div>
                        </div>
                    )}

                    <footer className="bg-[#1a1a1a] py-32 text-center border-t-8 border-yellow-400">
                        <img src="https://taxi-svoi.ru/wp-content/themes/taxi/img/logo.png" alt="СВОИ" className="h-16 mx-auto opacity-20 mb-10 shadow-2xl" />
                        <p className="text-gray-600 text-xs font-black uppercase tracking-[0.8em] mb-4">Taxi Svoi Corporate Portal</p>
                        <p className="text-gray-800 text-[10px] uppercase tracking-widest">© 2024 МЫ ВСЕГДА РЯДОМ С ТОБОЙ</p>
                    </footer>

                    <button
                        onClick={scrollToTop}
                        className="fixed bottom-8 right-8 bg-black text-yellow-400 p-4 rounded-2xl shadow-2xl border-4 border-yellow-400 hover:scale-110 transition-all z-[1000] group"
                        title="Наверх"
                    >
                        <Icon name="arrow-up" size={32} className="group-hover:-translate-y-1 transition-transform" />
                    </button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
